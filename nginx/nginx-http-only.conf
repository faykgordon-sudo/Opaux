# Temporary HTTP-only config used during initial SSL cert issuance
server {
    listen 80;
    server_name opaux.com www.opaux.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
