upstream opaux {
    server app:8000;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name opaux.com www.opaux.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name opaux.com www.opaux.com;

    ssl_certificate     /etc/letsencrypt/live/opaux.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/opaux.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Allow larger request bodies for CV uploads
    client_max_body_size 20m;

    # Gzip compression
    gzip on;
    gzip_types text/html text/plain text/css application/json application/javascript;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Long timeout for AI tasks
    proxy_read_timeout    300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    300s;

    # Default proxy
    location / {
        proxy_pass http://opaux;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # SSE streaming — no buffering
    location /stream/ {
        proxy_pass http://opaux;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # Static files with caching
    location /static/ {
        proxy_pass http://opaux;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }
}
